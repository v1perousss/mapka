<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>xbox gej studios</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --apple-glass: rgba(255, 255, 255, 0.88);
            --apple-blur: blur(30px) saturate(180%);
            --accent: #107C10; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden;
            font-family: -apple-system, system-ui, sans-serif;
        }

        #map { 
            position: absolute; top: 0; bottom: 0; width: 100%; 
            z-index: 1; background: #000;
        }

        .interface { position: absolute; z-index: 1000; pointer-events: none; width: 100%; height: 100%; }
        .interface * { pointer-events: auto; }

        .search-bar {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            width: 420px; max-width: 85%;
            background: var(--apple-glass); backdrop-filter: var(--apple-blur);
            padding: 12px 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.4); display: flex; align-items: center;
        }

        .search-bar input {
            border: none; background: transparent; width: 100%; font-size: 17px; outline: none; margin-left: 10px;
        }

        .brand {
            position: absolute; top: 25px; left: 30px; color: white; font-weight: 900; 
            font-size: 18px; text-transform: uppercase; letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .info-drawer {
            position: absolute; left: 20px; bottom: 20px; width: 360px;
            background: var(--apple-glass); backdrop-filter: var(--apple-blur);
            border-radius: 28px; padding: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            transform: translateX(-450px); transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .info-drawer.active { transform: translateX(0); }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .data-box { background: rgba(0,0,0,0.04); padding: 15px; border-radius: 18px; }
        .data-label { font-size: 10px; font-weight: 800; opacity: 0.5; text-transform: uppercase; }
        .data-val { font-size: 20px; font-weight: 600; color: #1c1c1e; }

        .map-tools {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px;
        }

        .tool-btn {
            width: 55px; height: 55px; background: var(--apple-glass); backdrop-filter: var(--apple-blur);
            border-radius: 18px; border: 1px solid rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); font-size: 22px;
        }

        .tool-btn.active { background: var(--accent); color: white; }

        .live-clock {
            position: absolute; top: 20px; right: 20px; background: var(--apple-glass);
            backdrop-filter: var(--apple-blur); padding: 10px 20px; border-radius: 20px;
            font-weight: 700; font-size: 15px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="interface">
    <div class="brand">xbox gej studios</div>

    <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="target" placeholder="Szukaj lokalizacji..." onkeypress="search(event)">
    </div>

    <div class="live-clock" id="timer">00:00:00</div>

    <div class="map-tools">
        <div class="tool-btn" onclick="map.zoomIn()">＋</div>
        <div class="tool-btn" onclick="map.zoomOut()">－</div>
        <div class="tool-btn" id="atlasMode" onclick="changeLayer('atlas')">🗺️</div>
        <div class="tool-btn" id="dayMode" onclick="changeLayer('day')">☀️</div>
        <div class="tool-btn" id="nightMode" onclick="changeLayer('night')">🌙</div>
    </div>

    <div class="info-drawer" id="drawer">
        <h1 id="title" style="margin:0; font-size: 30px; letter-spacing: -1px;">Lokalizacja</h1>
        <p id="coords" style="opacity:0.5; margin: 5px 0 20px 0; font-size: 13px;">Wczytywanie...</p>

        <div class="data-grid">
            <div class="data-box"><div class="data-label">Temperatura</div><div class="data-val" id="temp">--°C</div></div>
            <div class="data-box"><div class="data-label">Czas Lokalny</div><div class="data-val" id="ltime">--:--</div></div>
            <div class="data-box"><div class="data-label">Indeks AQI</div><div class="data-val" id="aqi">--</div></div>
            <div class="data-box"><div class="data-label">Wiatr</div><div class="data-val" id="wind">-- km/h</div></div>
        </div>

        <button onclick="document.getElementById('drawer').classList.remove('active')" style="width:100%; padding:16px; border-radius:16px; border:none; background:var(--accent); color:white; font-weight:700; cursor:pointer;">Zamknij</button>
    </div>
</div>

<script>
    let map, activeTiles, pin;
    
    const tileSets = {
        day: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
        night: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
        atlas: 'https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png'
    };

    function start() {
        map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false,
            minZoom: 2,
            maxBounds: [[-85, -180], [85, 180]],
            maxBoundsViscosity: 1.0 
        }).setView([52.23, 21.01], 6);

        activeTiles = L.tileLayer(tileSets.day, { noWrap: true }).addTo(map);

        setInterval(() => {
            document.getElementById('timer').innerText = new Date().toLocaleTimeString('pl-PL');
        }, 1000);

        map.on('click', (e) => fetchData("Wybrany punkt", e.latlng.lat, e.latlng.lng));
        
        changeLayer('day');
        setTimeout(() => map.invalidateSize(), 250);
    }

    function changeLayer(m) {
        activeTiles.setUrl(tileSets[m]);
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(m + 'Mode').classList.add('active');
    }

    async function search(e) {
        if(e.key === 'Enter') {
            const query = e.target.value;
            const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=1`);
            const d = await r.json();
            if(d.length > 0) {
                const loc = d[0];
                map.flyTo([loc.lat, loc.lon], 11);
                fetchData(loc.display_name, parseFloat(loc.lat), parseFloat(loc.lon));
            }
        }
    }

    async function fetchData(name, lat, lon) {
        document.getElementById('coords').innerText = lat.toFixed(4) + ", " + lon.toFixed(4);
        
        try {
            const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m`);
            const weatherData = await weatherRes.json();
            
            const aqiRes = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&current=european_aqi`);
            const aqiData = await aqiRes.json();

            let t = Math.round(weatherData.current.temperature_2m);
            const w = Math.round(weatherData.current.wind_speed_10m);
            const a = aqiData.current.european_aqi || 15;

            document.getElementById('temp').innerText = t + "°C";
            document.getElementById('wind').innerText = w + " km/h";
            document.getElementById('aqi').innerText = a;

            let h = (new Date().getUTCHours() + Math.round(lon / 15) + 24) % 24;
            let m = new Date().getUTCMinutes();
            document.getElementById('ltime').innerText = `${h < 10 ? '0'+h : h}:${m < 10 ? '0'+m : m}`;

        } catch (err) { console.error(err); }

        document.getElementById('title').innerText = name.split(',')[0];
        if(pin) map.removeLayer(pin);
        pin = L.marker([lat, lon]).addTo(map);
        document.getElementById('drawer').classList.add('active');
    }

    window.onload = start;
</script>
</body>
</html>
